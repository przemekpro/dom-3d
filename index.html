<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Model 3D — Dom z dobudówką</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a1a; overflow: hidden; font-family: system-ui, sans-serif; }
  canvas { display: block; }
  #info {
    position: absolute; top: 16px; left: 16px;
    background: rgba(0,0,0,0.7); color: #ccc; padding: 12px 16px;
    border-radius: 8px; font-size: 13px; line-height: 1.6;
    pointer-events: none; max-width: 260px;
  }
  #info h3 { color: #fff; font-size: 15px; margin-bottom: 6px; font-weight: 500; }
  #controls {
    position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 8px;
  }
  #controls button {
    background: rgba(0,0,0,0.7); color: #ccc; border: 1px solid #555;
    padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 13px;
    transition: all 0.2s;
  }
  #controls button:hover { background: rgba(60,60,60,0.9); color: #fff; }
  #controls button.active { background: rgba(80,120,180,0.7); color: #fff; border-color: #6a9fd8; }

</style>
</head>
<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xd4dde6);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 200);
camera.position.set(22, 16, 22);
camera.lookAt(0, 3, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true, logarithmicDepthBuffer: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// Lights
const ambient = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambient);

const sun = new THREE.DirectionalLight(0xffffff, 0.8);
sun.position.set(15, 20, 10);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.left = -60;
sun.shadow.camera.right = 60;
sun.shadow.camera.top = 60;
sun.shadow.camera.bottom = -60;
scene.add(sun);

const fill = new THREE.DirectionalLight(0x8899bb, 0.3);
fill.position.set(-10, 10, -10);
scene.add(fill);

// Materials
const mat = {
  tynk: new THREE.MeshLambertMaterial({ color: 0xede8db }),
  drewno: new THREE.MeshLambertMaterial({ color: 0xc9a86c, polygonOffset: true, polygonOffsetFactor: -1, polygonOffsetUnits: -1 }),
  dach: new THREE.MeshLambertMaterial({ color: 0x4a4845, polygonOffset: true, polygonOffsetFactor: -1, polygonOffsetUnits: -1 }),
  fundament: new THREE.MeshLambertMaterial({ color: 0x8a8578 }),
  okno: new THREE.MeshLambertMaterial({ color: 0x7aaed4, transparent: true, opacity: 0.6 }),
  rama: new THREE.MeshLambertMaterial({ color: 0x4a4a4a }),
  drzwi: new THREE.MeshLambertMaterial({ color: 0x5a5550 }),
  taras: new THREE.MeshLambertMaterial({ color: 0xb5b0a5 }),
  accent: new THREE.MeshLambertMaterial({ color: 0x4a5060, polygonOffset: true, polygonOffsetFactor: -1, polygonOffsetUnits: -1 }),
  trawa: new THREE.MeshLambertMaterial({ color: 0x6b8c42 }),
  chodnik: new THREE.MeshLambertMaterial({ color: 0xb0a898 }),
  schody: new THREE.MeshLambertMaterial({ color: 0x9a9590 }),
};

// Coordinate system: X = East, Z = South, Y = Up
// House center at origin, north wall at z=-4.5, south wall at z=4.5
// East wall at x=4.5, west wall at x=-4.5

function box(w, h, d, material, x, y, z) {
  const g = new THREE.BoxGeometry(w, h, d);
  const m = new THREE.Mesh(g, material);
  m.position.set(x, y, z);
  m.castShadow = true;
  m.receiveShadow = true;
  scene.add(m);
  return m;
}

// Ground — full plot size
const groundGeo = new THREE.PlaneGeometry(100, 100);
const ground = new THREE.Mesh(groundGeo, mat.trawa);
ground.rotation.x = -Math.PI/2;
ground.position.set(-1, -0.01, 11);
ground.receiveShadow = true;
scene.add(ground);

// ============== FOUNDATION (1.3m) ==============
box(9, 1.3, 9, mat.fundament, 0, 0.65, 0);

// ============== GROUND FLOOR WALLS (2.8m, from y=1.3 to y=4.1) ==============
// Tynk base
box(9, 2.8, 9, mat.tynk, 0, 1.3 + 1.4, 0);

// Wood cladding band on GF — offset 0.1 from wall to avoid z-fighting
box(9.1, 1.5, 0.1, mat.drewno, 0, 2.8, -4.56); // north
// South — split around balcony doors (doors at x=-1.75 to x=-0.25)
box(2.5, 1.5, 0.1, mat.drewno, -3.25, 2.8, 4.56);  // south left (x=-4.5 to -2.0)
box(4.2, 1.5, 0.1, mat.drewno, 2.4, 2.8, 4.56);    // south right (x=0.3 to 4.5)
box(0.1, 1.5, 9.1, mat.drewno, 4.56, 2.8, 0);   // east
box(0.1, 1.5, 9.1, mat.drewno, -4.56, 2.8, 0);  // west

// ============== FIRST FLOOR WALLS (2.7m, from y=4.1 to y=6.8) ==============
box(9, 2.7, 9, mat.tynk, 0, 4.1 + 1.35, 0);

// Wood band 1F
box(9.1, 0.4, 0.1, mat.drewno, 0, 4.4, -4.56);
box(9.1, 0.4, 0.1, mat.drewno, 0, 4.4, 4.56);
box(0.1, 0.4, 9.1, mat.drewno, 4.56, 4.4, 0);
box(0.1, 0.4, 9.1, mat.drewno, -4.56, 4.4, 0);

// ============== WINDOWS ==============
function addWindow(x, y, z, w, h, rotY) {
  const frame = box(w+0.1, h+0.1, 0.15, mat.rama, x, y, z);
  frame.rotation.y = rotY || 0;
  const glass = box(w-0.05, h-0.05, 0.08, mat.okno, x, y, z);
  glass.rotation.y = rotY || 0;
}

// North wall — narrow window at ganek level (near ganek)
addWindow(0.11, 2.8, -4.58, 0.6, 1.5, 0);
// North wall — 1F tall window above ganek
addWindow(0.11, 5.4, -4.58, 0.8, 1.5, 0);
// North wall — windows at right (west) corner, GF and 1F
addWindow(-3.5, 2.7, -4.58, 1.8, 1.3, 0);   // GF
addWindow(-3.5, 5.4, -4.58, 1.8, 1.5, 0);   // 1F

// South wall GF — double window + double balcony doors onto terrace
addWindow(-3.2, 2.7, 4.58, 1.6, 1.2, 0);  // double window (left)
// Double doors from south wall onto terrace (flush/closed)
box(1.5, 2.2, 0.1, mat.rama, -1.0, 1.3 + 1.1, 4.52);      // frame flush in wall
box(0.63, 2.1, 0.06, mat.okno, -1.35, 1.3 + 1.05, 4.52);   // left door
box(0.63, 2.1, 0.06, mat.okno, -0.65, 1.3 + 1.05, 4.52);   // right door
box(0.04, 2.2, 0.1, mat.rama, -1.0, 1.3 + 1.1, 4.52);      // center mullion

// Extension west wall — double balcony doors onto terrace (flush/closed)
box(0.1, 2.2, 1.5, mat.rama, -0.22, 1.3 + 1.1, 5.8);       // frame flush in wall
box(0.06, 2.1, 0.63, mat.okno, -0.22, 1.3 + 1.05, 5.45);   // north door
box(0.06, 2.1, 0.63, mat.okno, -0.22, 1.3 + 1.05, 6.15);   // south door
box(0.1, 2.2, 0.04, mat.rama, -0.22, 1.3 + 1.1, 5.8);      // center mullion

// Extension north face — no window

// East wall GF — centered tall window (same height as 1F)
addWindow(4.58, 2.8, 0, 0.8, 1.5, Math.PI/2);
// East wall — staircase window at half house height (spans GF/1F boundary)
addWindow(4.58, 4.1, -3.0, 0.7, 2.4, Math.PI/2);
// East wall — windows on south side, matching south wall window heights
addWindow(4.58, 2.7, 3.0, 0.8, 1.5, Math.PI/2);   // GF, 1.5m
addWindow(4.58, 5.4, 3.0, 0.8, 1.5, Math.PI/2);   // 1F, same as south 1F (1.5m)

// West wall GF windows — vertically aligned with 1F
addWindow(-4.58, 2.7, -1.5, 1.8, 1.3, Math.PI/2);
addWindow(-4.58, 2.7, 3.0, 1.8, 1.3, Math.PI/2);

// North wall 1F — already added above

// South wall 1F — empty

// West wall 1F windows — vertically aligned with GF
addWindow(-4.58, 5.4, -1.5, 1.8, 1.5, Math.PI/2);

// SW corner window 1F — wraps around corner (wider)
addWindow(-4.58, 5.4, 4.0, 1.4, 1.5, Math.PI/2);  // west face
addWindow(-3.8, 5.4, 4.58, 1.4, 1.5, 0);            // south face

// South wall 1F — window above extension area
addWindow(2.0, 5.4, 4.58, 1.4, 1.5, 0);

// East wall 1F — directly above GF tall window
addWindow(4.58, 5.4, 0, 0.8, 1.5, Math.PI/2);

// ============== MAIN HIP ROOF ==============
function createHipRoof(cx, cy, cz, w, d, roofH, overhang) {
  const hw = w/2 + overhang;
  const hd = d/2 + overhang;
  const ridgeLen = (w - d) / 2;
  const rw = w/2 - d/2;

  const shape = new THREE.Shape();
  // Front-right, going clockwise from top
  const vertices = [
    // bottom rectangle (eave level)
    new THREE.Vector3(-hw, 0, -hd),
    new THREE.Vector3(hw, 0, -hd),
    new THREE.Vector3(hw, 0, hd),
    new THREE.Vector3(-hw, 0, hd),
    // ridge
    new THREE.Vector3(-rw, roofH, 0),
    new THREE.Vector3(rw, roofH, 0),
  ];

  const geo = new THREE.BufferGeometry();
  // 8 triangles for hip roof
  const indices = [
    // North slope
    0, 1, 5, 0, 5, 4,
    // East slope
    1, 2, 5,
    // South slope
    2, 3, 4, 2, 4, 5,
    // West slope
    3, 0, 4,
    // Bottom (optional)
    0, 3, 2, 0, 2, 1,
  ];

  const positions = [];
  vertices.forEach(v => positions.push(v.x, v.y, v.z));

  geo.setIndex(indices);
  geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  geo.computeVertexNormals();

  const mesh = new THREE.Mesh(geo, mat.dach);
  mesh.position.set(cx, cy, cz);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  scene.add(mesh);
  return mesh;
}

// Main house roof at y=6.8, hip roof with 3.2m flat ridge running E-W
{
  const ov = 0.5;
  const roofBase = 6.82;
  const roofH = 1.3;
  const hw = 9/2 + ov; // half width + overhang
  const hd = 9/2 + ov;
  const ridgeHalf = 3.2 / 2; // 1.6m each side of center

  const verts = [
    -hw, roofBase, -hd,           // 0: NW eave
     hw, roofBase, -hd,           // 1: NE eave
     hw, roofBase,  hd,           // 2: SE eave
    -hw, roofBase,  hd,           // 3: SW eave
    -ridgeHalf, roofBase+roofH, 0, // 4: W ridge
     ridgeHalf, roofBase+roofH, 0, // 5: E ridge
  ];

  const idx = [
    // North slope
    0, 1, 5, 0, 5, 4,
    // East hip
    1, 2, 5,
    // South slope
    2, 3, 4, 2, 4, 5,
    // West hip
    3, 0, 4,
    // Bottom
    0, 3, 2, 0, 2, 1,
  ];

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
  geo.setIndex(idx);
  geo.computeVertexNormals();
  const mesh = new THREE.Mesh(geo, mat.dach);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  scene.add(mesh);

  // PRZYBITKA (fascia) — main house roof
  const fb = 0.3;
  const fo = 0.5;
  box(9 + fo*2, fb, 0.1, mat.tynk, 0, 6.82 - fb/2, -(9/2 + fo));
  box(9 + fo*2, fb, 0.1, mat.tynk, 0, 6.82 - fb/2, 9/2 + fo);
  box(0.1, fb, 9 + fo*2, mat.tynk, 9/2 + fo, 6.82 - fb/2, 0);
  box(0.1, fb, 9 + fo*2, mat.tynk, -(9/2 + fo), 6.82 - fb/2, 0);
}
// Extension: 6.9m E-W (x), 4.7m N-S (z)
// Sticks out 2.2m east: east edge x=4.5+2.2=6.7, west edge x=6.7-6.9=-0.2
// South edge z=4.5+4.7=9.2

// Extension: 6.9m E-W (x), 4.7m N-S (z)
// Sticks out 2.2m east: east edge x=4.5+2.2=6.7, west edge x=6.7-6.9=-0.2
// South edge z=4.5+4.7=9.2
const extCX = (-0.2 + 6.7) / 2; // 3.25
const extCZ = (4.5 + 9.2) / 2; // 6.85
const extW = 6.9;
const extD = 4.7;

// Extension foundation
box(extW, 1.3, extD, mat.fundament, extCX, 0.65, extCZ);

// Extension GF walls
box(extW, 2.8, extD, mat.tynk, extCX, 1.3 + 1.4, extCZ);

// Extension wood cladding — 0.1 offset to avoid z-fighting
box(extW + 0.1, 1.5, 0.1, mat.drewno, extCX, 2.8, 4.5 + 0.06); // north face (against house - mostly hidden)
box(extW + 0.1, 1.5, 0.1, mat.drewno, extCX, 2.8, 9.2 + 0.06); // south face
box(0.1, 1.5, extD + 0.1, mat.drewno, 6.7 + 0.06, 2.8, extCZ);  // east face
// West face — split around balcony doors (doors at z=5.05..6.55)
box(0.1, 1.5, 0.5, mat.drewno, -0.2 - 0.06, 2.8, 4.75);   // north of doors
box(0.1, 1.5, 2.5, mat.drewno, -0.2 - 0.06, 2.8, 7.95);   // south of doors
// North face visible overhang part (x=4.5 to x=6.7, z=4.5)
box(2.2 + 0.1, 1.5, 0.1, mat.drewno, 4.5 + 1.15, 2.8, 4.5 - 0.06);
// Tynk above/below wood on visible north overhang
box(2.2 + 0.1, 2.8, 0.08, mat.tynk, 4.5 + 1.15, 1.3 + 1.4, 4.5 - 0.06);

// Dark accent strips
box(extW + 0.12, 0.12, 0.1, mat.accent, extCX, 4.1, 9.2 + 0.06);
box(extW + 0.12, 0.12, 0.1, mat.accent, extCX, 1.32, 9.2 + 0.06);
box(0.1, 0.12, extD + 0.1, mat.accent, 6.7 + 0.06, 4.1, extCZ);
box(0.1, 0.12, extD + 0.1, mat.accent, 6.7 + 0.06, 1.32, extCZ);

// Extension windows — south face
addWindow(extCX - 1.5, 2.8, 9.24, 1.3, 1.3, 0);
addWindow(extCX + 1.5, 2.8, 9.24, 1.3, 1.3, 0);
// Extension windows — east face
addWindow(6.74, 2.8, extCZ - 0.8, 1.2, 1.2, Math.PI/2);
addWindow(6.74, 2.8, extCZ + 0.8, 1.2, 1.2, Math.PI/2);
// Extension window — west face (south end, away from doors)
addWindow(-0.24, 2.8, 8.2, 1.2, 1.2, Math.PI/2);

// Extension roof — switchable between two variants
let extRoofMeshes = [];

function clearExtRoof() {
  extRoofMeshes.forEach(m => scene.remove(m));
  extRoofMeshes = [];
}

function buildExtRoof() {
  clearExtRoof();
  const ov = 0.5;
  const eave = 4.1;
  const fb = 0.25;
  const ridgeY = 4.8;

  // Kalenica prostopadła do ściany domu (N→S)
  const ridgeX = (-0.2 + 6.7) / 2; // = 3.25 — środek dobudówki

  // Eave corners with overhang
  const x1 = -0.2 - ov;   // west eave
  const x2 = 6.7 + ov;    // east eave
  const z1 = 4.5 - ov;    // north eave (przy domu, z okapem)
  const z2 = 9.2 + ov;    // south eave

  // Punkt końcowy kalenicy — zostawiamy miejsce na hip (trójkątną połać południową)
  const ridgeS_z = 9.2 - 2.0; // = 7.2 — 2m od południowej krawędzi

  // Wierzchołki:
  // 0: SW eave (x1, eave, z2)
  // 1: SE eave (x2, eave, z2)
  // 2: NE eave (x2, eave, z1)
  // 3: NW eave (x1, eave, z1)
  // 4: Ridge north (ridgeX, ridgeY, z1) — przy ścianie domu
  // 5: Ridge south (ridgeX, ridgeY, ridgeS_z)
  const verts = [
    x1, eave, z2,             // 0: SW
    x2, eave, z2,             // 1: SE
    x2, eave, z1,             // 2: NE
    x1, eave, z1,             // 3: NW
    ridgeX, ridgeY, z1,       // 4: Ridge N (przy ścianie domu)
    ridgeX, ridgeY, ridgeS_z, // 5: Ridge S
  ];

  const idx = [
    // West slope (od kalenicy na zachód)
    3, 0, 5, 3, 5, 4,
    // East slope (od kalenicy na wschód)
    1, 2, 4, 1, 4, 5,
    // South hip (trójkąt od końca kalenicy na południe)
    0, 1, 5,
    // Bottom
    0, 3, 2, 0, 2, 1,
  ];

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
  geo.setIndex(idx);
  geo.computeVertexNormals();
  const m = new THREE.Mesh(geo, mat.dach);
  m.castShadow = true; m.receiveShadow = true;
  scene.add(m); extRoofMeshes.push(m);

  // Przybitki (fascia) — na 3 stronach (zachód, wschód, południe). Bez północnej bo jest przy ścianie domu.
  [
    [extW + ov*2, fb, 0.06, extCX, eave - fb/2, z2],     // south
    [0.06, fb, extD + ov*2, x2, eave - fb/2, extCZ],      // east
    [0.06, fb, extD + ov*2, x1, eave - fb/2, extCZ],      // west
  ].forEach(p => { const b = box(p[0],p[1],p[2],mat.tynk,p[3],p[4],p[5]); extRoofMeshes.push(b); });
}

buildExtRoof();

// ============== GANEK (ENTRANCE PORCH) ==============
const gankX = 0.11;
const gankW = 2.5;
const gankD = 1.5;
const gankCZ = -4.5 - gankD/2;

// Foundation
box(gankW, 1.3, gankD, mat.fundament, gankX, 0.65, gankCZ);

// Walls (slightly narrower so cladding sits on top without z-fight)
box(gankW - 0.02, 2.8, gankD - 0.02, mat.tynk, gankX, 1.3 + 1.4, gankCZ);

// Wood cladding — sits clearly outside walls
box(gankW + 0.1, 1.5, 0.12, mat.drewno, gankX, 2.8, -4.5 - gankD - 0.06); // north face
box(0.12, 1.5, gankD + 0.1, mat.drewno, gankX - gankW/2 - 0.06, 2.8, gankCZ); // west face
box(0.12, 1.5, gankD + 0.1, mat.drewno, gankX + gankW/2 + 0.06, 2.8, gankCZ); // east face

// 3-sided hip roof — south edge buried deep inside house body to avoid z-fight
{
  const ov = 0.4;
  const eave = 4.15;
  const ridgeY = 4.6;
  const zNorth = -4.5 - gankD - ov;
  const zSouth = -4.0; // 0.5m INSIDE house body — completely hidden
  const x1 = gankX - gankW/2 - ov;
  const x2 = gankX + gankW/2 + ov;
  const rx1 = gankX - gankW/2 + 0.7;
  const rx2 = gankX + gankW/2 - 0.7;

  const verts = [
    x1, eave, zNorth,       // 0: NW eave
    x2, eave, zNorth,       // 1: NE eave
    x2, eave, zSouth,       // 2: SE deep inside house
    x1, eave, zSouth,       // 3: SW deep inside house
    rx1, ridgeY, zSouth,    // 4: W ridge inside house
    rx2, ridgeY, zSouth,    // 5: E ridge inside house
  ];
  const idx = [
    0, 1, 5, 0, 5, 4,  // north slope (main visible)
    1, 2, 5,            // east hip
    3, 0, 4,            // west hip
    0, 3, 2, 0, 2, 1,  // bottom
  ];
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
  geo.setIndex(idx);
  geo.computeVertexNormals();
  const m = new THREE.Mesh(geo, mat.dach);
  m.castShadow = true; m.receiveShadow = true;
  scene.add(m);

  // Przybitka — north, east, west
  const fb = 0.22;
  box(gankW + ov*2, fb, 0.1, mat.tynk, gankX, eave - fb/2, zNorth);
  box(0.1, fb, gankD + ov, mat.tynk, x1, eave - fb/2, -4.5 - gankD/2 - ov/2);
  box(0.1, fb, gankD + ov, mat.tynk, x2, eave - fb/2, -4.5 - gankD/2 - ov/2);
}

// Door on east wall
box(0.15, 2.1, 1.0, mat.drzwi, gankX + gankW/2 + 0.1, 1.3 + 1.1, gankCZ);

// Stairs going east, full ganek width, 9 steps
{
  const stairD = 0.28;
  const stairH = 1.3 / 9;
  const stairsStartX = gankX + gankW/2 + 0.12;
  const stairsLen = 9 * stairD;

  for (let i = 0; i < 9; i++) {
    const sx = stairsStartX + i * stairD + stairD/2;
    box(stairD - 0.02, stairH * (9 - i), gankW, mat.schody, sx, stairH * (9 - i) / 2, gankCZ);
  }

  // Glass railings following stair slope
  const glassM = new THREE.MeshLambertMaterial({ color: 0xaaccdd, transparent: true, opacity: 0.3 });
  const railMat = new THREE.MeshLambertMaterial({ color: 0x555555 });
  const railH = 0.9;

  for (let side = -1; side <= 1; side += 2) {
    const sz = gankCZ + side * (gankW/2 - 0.02);

    // Glass panel — trapezoid following stairs
    const gv = [
      stairsStartX + stairsLen, 0,            sz,
      stairsStartX + stairsLen, railH,         sz,
      stairsStartX,             1.3 + railH,   sz,
      stairsStartX,             1.3,           sz,
    ];
    const gi = [0, 1, 2, 0, 2, 3, 3, 2, 1, 3, 1, 0];
    const gg = new THREE.BufferGeometry();
    gg.setAttribute('position', new THREE.Float32BufferAttribute(gv, 3));
    gg.setIndex(gi);
    gg.computeVertexNormals();
    scene.add(new THREE.Mesh(gg, glassM));

    // Handrail — segmented boxes
    const segs = 10;
    for (let s = 0; s < segs; s++) {
      const t1 = s / segs, t2 = (s + 1) / segs;
      const xa = stairsStartX + stairsLen * (1 - t1);
      const xb = stairsStartX + stairsLen * (1 - t2);
      const ya = t1 * 1.3 + railH;
      const yb = t2 * 1.3 + railH;
      const sLen = Math.sqrt((xb-xa)**2 + (yb-ya)**2);
      const sAng = Math.atan2(yb - ya, xb - xa);
      const rg = new THREE.BoxGeometry(sLen, 0.035, 0.035);
      const rm = new THREE.Mesh(rg, railMat);
      rm.position.set((xa+xb)/2, (ya+yb)/2, sz);
      rm.rotation.z = sAng;
      scene.add(rm);
    }

    // Posts
    box(0.035, railH, 0.035, railMat, stairsStartX + stairsLen, railH/2, sz);
    box(0.035, railH, 0.035, railMat, stairsStartX, 1.3 + railH/2, sz);
    box(0.035, railH * 0.7, 0.035, railMat, stairsStartX + stairsLen/2, 0.65 + railH * 0.35, sz);
  }

  {
    const ov = 0.4;
    const x1 = mainWestWall - ov, x2 = eastWall + ov;
    const z1 = atticSouthWall - 0.1;           // początek (północ, przy ścianie piętra)
    const z2 = southWall + ov;                  // koniec (południe)
    const thick = 0.12;

    // Dach opada z północy (wysoko, przy ścianie piętra) na południe (nisko)
    const shedHigh = gTop + 0.3;               // góra — tuż nad parterem, przy ścianie piętra
    const shedLow = gTop + 0.05;               // dół — na południowym końcu

    const verts = [
      x1, shedHigh, z1, x2, shedHigh, z1,
      x2, shedLow, z2, x1, shedLow, z2,
      x1, shedHigh - thick, z1, x2, shedHigh - thick, z1,
      x2, shedLow - thick, z2, x1, shedLow - thick, z2,
    ];
    const idx = [0,1,2, 0,2,3, 4,6,5, 4,7,6, 0,4,5, 0,5,1, 2,6,7, 2,7,3, 1,5,6, 1,6,2, 0,3,7, 0,7,4];
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
    geo.setIndex(idx); geo.computeVertexNormals();
    const m = new THREE.Mesh(geo, mat.dach);
    m.castShadow = true; m.receiveShadow = true;
    scene.add(m);

    // Listwy krawędziowe dachu jednospadowego
    const shedCenterZ = (z1 + z2) / 2;
    const shedLen = z2 - z1;
    box(0.08, 0.15, shedLen, mat.accent, x1, (shedHigh + shedLow)/2 - 0.07, shedCenterZ);
    box(0.08, 0.15, shedLen, mat.accent, x2, (shedHigh + shedLow)/2 - 0.07, shedCenterZ);
  }
}
  // ============== WIATA (3.5x6m) ==============
  {
    const garageWestMain = 9.5;
    const wW = 3.5, wD = 6;
    const wX = garageWestMain - wW/2;
    const wZ = 28.8;
    const roofHigh = 3.1; // north edge
    const roofLow = 2.7;  // south edge
    const ov = 0.3;

    box(wW, 0.15, wD, mat.taras, wX, 0.08, wZ);

    // South wall — height = roofLow (matches low edge of roof)
    box(wW, roofLow, 0.15, mat.tynk, wX, roofLow/2, wZ + wD/2);
    box(wW - 0.2, 1.4, 0.12, mat.drewno, wX, 0.7, wZ + wD/2 + 0.08);

    // West wall — TRAPEZOID shape following roof slope
    // Use custom geometry: north edge at roofHigh, south edge at roofLow
    {
      const wx = wX - wW/2;
      const zN = wZ - wD/2;
      const zS = wZ + wD/2;
      const v = [
        wx-0.075, 0, zN, wx+0.075, 0, zN,
        wx+0.075, 0, zS, wx-0.075, 0, zS,
        wx-0.075, roofHigh, zN, wx+0.075, roofHigh, zN,
        wx+0.075, roofLow, zS, wx-0.075, roofLow, zS,
      ];
      const i = [
        0,1,5, 0,5,4, 2,3,7, 2,7,6,
        4,5,6, 4,6,7,
        0,3,2, 0,2,1,
        1,2,6, 1,6,5,
        0,4,7, 0,7,3,
      ];
      const g = new THREE.BufferGeometry();
      g.setAttribute('position', new THREE.Float32BufferAttribute(v, 3));
      g.setIndex(i); g.computeVertexNormals();
      const m = new THREE.Mesh(g, mat.tynk);
      m.castShadow = true; m.receiveShadow = true;
      scene.add(m);
    }
    // Wood cladding on west wall (lower portion)
    box(0.12, 1.4, wD - 0.2, mat.drewno, wX - wW/2 - 0.08, 0.7, wZ);

    // Posts on open sides
    const postMat = new THREE.MeshLambertMaterial({ color: 0x555555 });
    box(0.12, roofHigh, 0.12, postMat, wX + wW/2 - 0.06, roofHigh/2, wZ - wD/2 + 0.06);
    box(0.12, roofLow, 0.12, postMat, wX + wW/2 - 0.06, roofLow/2, wZ + wD/2 - 0.06);

    // Roof slab
    {
      const x1 = wX - wW/2 - ov, x2 = wX + wW/2 + ov;
      const z1 = wZ - wD/2 - ov, z2 = wZ + wD/2 + ov;
      const thick = 0.12;
      const verts = [
        x1, roofLow, z2, x2, roofLow, z2,
        x2, roofHigh, z1, x1, roofHigh, z1,
        x1, roofLow - thick, z2, x2, roofLow - thick, z2,
        x2, roofHigh - thick, z1, x1, roofHigh - thick, z1,
      ];
      const idx = [0,1,2, 0,2,3, 4,6,5, 4,7,6, 0,4,5, 0,5,1, 2,6,7, 2,7,3, 1,5,6, 1,6,2, 0,3,7, 0,7,4];
      const geo = new THREE.BufferGeometry();
      geo.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
      geo.setIndex(idx); geo.computeVertexNormals();
      const m = new THREE.Mesh(geo, mat.dach);
      m.castShadow = true; m.receiveShadow = true;
      scene.add(m);
    }
    box(wW + 0.6, 0.15, 0.06, mat.accent, wX, roofLow - 0.08, wZ + wD/2 + 0.3);
  }
}
// ============== GROUND GRID (subtle) ==============
const gridHelper = new THREE.GridHelper(100, 100, 0x888888, 0x888888);
gridHelper.position.set(-1, 0, 11);
gridHelper.material.opacity = 0.08;
gridHelper.material.transparent = true;
scene.add(gridHelper);

// ============== ORBIT CONTROLS (manual) ==============
let isDragging = false;
let isPanning = false;
let prevMouse = { x: 0, y: 0 };
let spherical = { r: 32, theta: Math.PI/4, phi: Math.PI/4 };
let target = new THREE.Vector3(0, 3, 2);

function updateCamera() {
  camera.position.x = target.x + spherical.r * Math.sin(spherical.phi) * Math.sin(spherical.theta);
  camera.position.y = target.y + spherical.r * Math.cos(spherical.phi);
  camera.position.z = target.z + spherical.r * Math.sin(spherical.phi) * Math.cos(spherical.theta);
  camera.lookAt(target);
}
updateCamera();

renderer.domElement.addEventListener('mousedown', (e) => {
  if (e.button === 0) isDragging = true;
  if (e.button === 2) isPanning = true;
  prevMouse = { x: e.clientX, y: e.clientY };
});

renderer.domElement.addEventListener('mousemove', (e) => {
  const dx = e.clientX - prevMouse.x;
  const dy = e.clientY - prevMouse.y;
  if (isDragging) {
    spherical.theta -= dx * 0.005;
    spherical.phi = Math.max(0.1, Math.min(Math.PI/2 - 0.05, spherical.phi + dy * 0.005));
    updateCamera();
  }
  if (isPanning) {
    const right = new THREE.Vector3();
    const up = new THREE.Vector3(0, 1, 0);
    camera.getWorldDirection(right);
    right.cross(up).normalize();
    target.addScaledVector(right, -dx * 0.02);
    target.y += dy * 0.02;
    updateCamera();
  }
  prevMouse = { x: e.clientX, y: e.clientY };
});

window.addEventListener('mouseup', () => { isDragging = false; isPanning = false; });
renderer.domElement.addEventListener('contextmenu', (e) => e.preventDefault());

renderer.domElement.addEventListener('wheel', (e) => {
  spherical.r = Math.max(8, Math.min(100, spherical.r + e.deltaY * 0.02));
  updateCamera();
});

// Touch controls
let touchDist = 0;
let touchCenter = { x: 0, y: 0 };
renderer.domElement.addEventListener('touchstart', (e) => {
  if (e.touches.length === 1) {
    isDragging = true;
    prevMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  }
  if (e.touches.length === 2) {
    isDragging = false;
    touchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    touchCenter = { x: (e.touches[0].clientX + e.touches[1].clientX) / 2, y: (e.touches[0].clientY + e.touches[1].clientY) / 2 };
  }
});
renderer.domElement.addEventListener('touchmove', (e) => {
  e.preventDefault();
  if (e.touches.length === 1 && isDragging) {
    const dx = e.touches[0].clientX - prevMouse.x;
    const dy = e.touches[0].clientY - prevMouse.y;
    spherical.theta -= dx * 0.005;
    spherical.phi = Math.max(0.1, Math.min(Math.PI/2 - 0.05, spherical.phi + dy * 0.005));
    updateCamera();
    prevMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  }
  if (e.touches.length === 2) {
    const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    const cx = (e.touches[0].clientX + e.touches[1].clientX) / 2;
    const cy = (e.touches[0].clientY + e.touches[1].clientY) / 2;
    const dx = cx - touchCenter.x;
    const dy = cy - touchCenter.y;
    // Zoom (pinch)
    spherical.r = Math.max(8, Math.min(100, spherical.r - (d - touchDist) * 0.05));
    // Pan (2-finger drag)
    const right = new THREE.Vector3();
    const up = new THREE.Vector3(0, 1, 0);
    camera.getWorldDirection(right);
    right.cross(up).normalize();
    target.addScaledVector(right, -dx * 0.02);
    target.y += dy * 0.02;
    touchDist = d;
    touchCenter = { x: cx, y: cy };
    updateCamera();
  }
}, { passive: false });
renderer.domElement.addEventListener('touchend', () => { isDragging = false; });

// View presets
function animateView(theta, phi, r, tx, ty, tz) {
  document.querySelectorAll('#controls button').forEach(b => b.classList.remove('active'));
  const steps = 40;
  const startT = spherical.theta, startP = spherical.phi, startR = spherical.r;
  const startTX = target.x, startTY = target.y, startTZ = target.z;
  let step = 0;
  function tick() {
    step++;
    const t = step / steps;
    const ease = t < 0.5 ? 2*t*t : 1 - Math.pow(-2*t+2, 2)/2;
    spherical.theta = startT + (theta - startT) * ease;
    spherical.phi = startP + (phi - startP) * ease;
    spherical.r = startR + (r - startR) * ease;
    target.x = startTX + (tx - startTX) * ease;
    target.y = startTY + (ty - startTY) * ease;
    target.z = startTZ + (tz - startTZ) * ease;
    updateCamera();
    if (step < steps) requestAnimationFrame(tick);
  }
  tick();
}

function viewSouth() { animateView(Math.PI, 0.4, 28, 0, 3, 2); document.getElementById('btn-s').classList.add('active'); }
function viewEast() { animateView(Math.PI/2, 0.4, 28, 0, 3, 2); document.getElementById('btn-e').classList.add('active'); }
function viewNorth() { animateView(0, 0.4, 28, 0, 3, 2); document.getElementById('btn-n').classList.add('active'); }
function viewWest() { animateView(-Math.PI/2, 0.4, 28, 0, 3, 2); document.getElementById('btn-w').classList.add('active'); }
function viewTop() { animateView(0, 0.05, 35, 0, 0, 3); document.getElementById('btn-t').classList.add('active'); }
function viewIso() { animateView(Math.PI/4, Math.PI/4, 32, 0, 3, 2); document.getElementById('btn-i').classList.add('active'); }
function viewPlot() { animateView(Math.PI/4, 0.15, 75, -1, 0, 11); document.getElementById('btn-p').classList.add('active'); }

// Resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Keyboard movement (arrows + WASD + QE for up/down)
const keys = {};
window.addEventListener('keydown', (e) => { keys[e.code] = true; });
window.addEventListener('keyup', (e) => { keys[e.code] = false; });

// Render loop
function animate() {
  requestAnimationFrame(animate);

  // Keyboard pan — move target relative to camera direction
  const speed = 0.3;
  if (keys['ArrowUp'] || keys['KeyW']) {
    target.x -= Math.sin(spherical.theta) * speed;
    target.z -= Math.cos(spherical.theta) * speed;
    updateCamera();
  }
  if (keys['ArrowDown'] || keys['KeyS']) {
    target.x += Math.sin(spherical.theta) * speed;
    target.z += Math.cos(spherical.theta) * speed;
    updateCamera();
  }
  if (keys['ArrowLeft'] || keys['KeyA']) {
    target.x -= Math.cos(spherical.theta) * speed;
    target.z += Math.sin(spherical.theta) * speed;
    updateCamera();
  }
  if (keys['ArrowRight'] || keys['KeyD']) {
    target.x += Math.cos(spherical.theta) * speed;
    target.z -= Math.sin(spherical.theta) * speed;
    updateCamera();
  }
  if (keys['KeyQ']) { target.y += speed * 0.5; updateCamera(); }
  if (keys['KeyE']) { target.y -= speed * 0.5; updateCamera(); }

  renderer.render(scene, camera);
}
animate();
</script>
